<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3c"/>
      <stop offset="100%" stop-color="#1c1c1e"/>
    </linearGradient>
  </defs>
  <!-- macOS squircle background -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220" fill="url(#bg)"/>
  <!-- subtle inner shadow/border -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220" fill="none" stroke="#4a4a4c" stroke-width="2"/>
  <!-- "stvt" text, top-left positioned like the macOS exec icon -->
  <text x="160" y="440" font-family="SF Mono, Menlo, monospace" font-size="200" font-weight="500" fill="#32d74b" letter-spacing="4">stvt</text>
</svg>
